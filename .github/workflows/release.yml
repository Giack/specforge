name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o specforge-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/specforge

      - uses: actions/upload-artifact@v4
        with:
          name: specforge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: specforge-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Publish latest release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh release create latest \
            --title "Latest (main)" \
            --notes "Automated release from \`main\` — commit ${COMMIT_SHA}" \
            --prerelease \
            specforge-darwin-amd64 \
            specforge-darwin-arm64 \
            specforge-linux-amd64 \
            specforge-linux-arm64
