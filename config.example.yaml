# SpecForge Configuration
#
# Copy this to ~/.specforge/config.yaml and fill in your values

atlassian:
  domain: your-company
  email: your-email@company.com
  api_token: your-api-token
  project_key: PROJ

# Version Control System (GitHub, GitLab, or Bitbucket)
vcs:
  provider: github  # github, gitlab, bitbucket

  github:
    token: ghp_your_token
    owner: your-org
    repo: your-repo

  gitlab:
    domain: gitlab.com
    token: glpat_your_token
    group: your-group
    project_id: ""

  bitbucket:
    domain: bitbucket.org
    username: your-username
    app_password: your-app_password
    workspace: your-workspace

ai:
  provider: claude  # claude or opencode
  model: sonnet-4-20250514
  max_tokens: 4000

spec_repo:
  url: https://github.com/your-org/specs-repo.git
  branch: main
